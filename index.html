<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>OrthoBoost — Design Previews</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --ink:#313131; --faint:#8a8a86; --line:#e4e2de; --accent:#CCDBE7; }
  * { margin:0; box-sizing:border-box; }
  body { font-family:Nunito,system-ui,sans-serif; color:var(--ink); background:#FCFBF9; min-height:100vh; display:grid; place-items:center; padding:40px 24px; }
  main { width:100%; max-width:560px; }
  h1 { font-weight:700; font-size:1.35rem; letter-spacing:-.01em; }
  p.sub { color:var(--faint); font-weight:300; margin:6px 0 34px; }
  ul { list-style:none; }
  li + li { border-top:1px solid var(--line); }
  a { display:flex; justify-content:space-between; align-items:baseline; gap:16px; padding:18px 4px; text-decoration:none; color:inherit; }
  a:hover b { text-decoration:underline; text-decoration-color:var(--accent); text-decoration-thickness:3px; }
  a b { font-weight:600; }
  a span { color:var(--faint); font-size:.85rem; font-weight:300; white-space:nowrap; }
  footer { margin-top:40px; color:var(--faint); font-size:.8rem; font-weight:300; }
</style>
</head>
<body>
<main>
  <h1>Design previews</h1>
  <p class="sub">Current client preview spaces.</p>
  <ul>
    <li><a href="downtown-orthodontics/"><b>Downtown Orthodontics</b><span>3 concepts · light &amp; dark</span></a></li>
  </ul>
  <footer>OrthoBoost</footer>
</main>
</body>
</html>
